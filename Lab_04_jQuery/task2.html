<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Animated Image Gallery</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    body { font-family: Arial; max-width: 800px; margin: 30px auto; }
    .gallery { border: 1px solid #ccc; border-radius: 8px; overflow: hidden; }
    .viewport { height: 420px; background: #000; position: relative; }
    .viewport img {
      max-width: 100%; max-height: 100%;
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      display: none; border-radius: 6px;
    }
    .controls { display: flex; justify-content: space-between; padding: 10px; }
    .btn { padding: 8px 14px; background: #0078d4; color: #fff; border: none; border-radius: 5px; cursor: pointer; }
    .caption { flex: 1; text-align: center; font-size: 16px; }
    .thumbs { display: flex; gap: 10px; padding: 10px; overflow-x: auto; }
    .thumbs img { width: 100px; height: 60px; object-fit: cover; border-radius: 4px; opacity: 0.6; cursor: pointer; }
    .thumbs img.active { opacity: 1; border: 2px solid #0078d4; }
  </style>
</head>

<body>

<h2>Animated Image Gallery</h2>

<div class="gallery">
  <div class="viewport" id="viewport">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" data-index="0" alt="Sunrise">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" data-index="1" alt="Lake Reflection">
    <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e" data-index="2" alt="City Skyline">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" data-index="3" alt="Autumn Forest">
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn">Previous</button>
    <div class="caption" id="caption"></div>
    <button class="btn" id="nextBtn">Next</button>
  </div>

  <div class="thumbs" id="thumbs">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" data-index="0">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" data-index="1">
    <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e" data-index="2">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" data-index="3">
  </div>
</div>

<script>
$(function () {
  const captions = [
    "Sunrise over the hills",
    "Calm lake reflection",
    "City skyline at dusk",
    "Forest path in autumn"
  ];

  let current = 0;
  const fadeTime = 400;

  const $viewport = $("#viewport img");
  const $caption = $("#caption");

  function showImage(index) {
    $viewport.fadeOut(fadeTime);
    $viewport.eq(index).fadeIn(fadeTime);
    $caption.text(captions[index]);

    $("#thumbs img").removeClass("active");
    $("#thumbs img").eq(index).addClass("active");

    current = index;
  }

  $("#nextBtn").click(() => showImage((current + 1) % $viewport.length));
  $("#prevBtn").click(() => showImage((current - 1 + $viewport.length) % $viewport.length));

  $("#thumbs img").click(function () {
    showImage($(this).data("index"));
  });

  showImage(0);
});
</script>

</body>
</html>
